name: Express Sample Artifact

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Generate Express assessment sample
        run: python -m nico.assessment ./nico/test_lab --tier express --output assessment_latest

      - name: Upload Express assessment sample
        uses: actions/upload-artifact@v4
        with:
          name: nico-express-assessment-sample
          path: assessment_latest/
          if-no-files-found: error
