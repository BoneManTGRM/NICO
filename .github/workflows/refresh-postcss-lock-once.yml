name: Refresh PostCSS lock once

on:
  push:
    branches:
      - release/0.1.1-redeploy
    paths:
      - .github/workflows/refresh-postcss-lock-once.yml

permissions:
  contents: write

concurrency:
  group: refresh-postcss-lock-once-release-0-1-1
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out release branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: release/0.1.1-redeploy
          fetch-depth: 1

      - name: Set up Node 20
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Apply fixed PostCSS override and regenerate exact lock
        working-directory: apps/web
        run: |
          npm pkg set overrides.postcss=8.5.12
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund
          npm ci --ignore-scripts --no-audit --no-fund

      - name: Require clean production dependency audit
        working-directory: apps/web
        run: npm audit --omit=dev --audit-level=high

      - name: Verify frontend contracts
        working-directory: apps/web
        run: |
          npm run lint
          npm run build

      - name: Verify exact patched dependency
        working-directory: apps/web
        run: |
          node - <<'NODE'
          const pkg = require('./package.json')
          const lock = require('./package-lock.json')
          const installed = lock.packages?.['node_modules/postcss']?.version
          if (pkg.overrides?.postcss !== '8.5.12') throw new Error(`package override is ${pkg.overrides?.postcss}`)
          if (installed !== '8.5.12') throw new Error(`lockfile PostCSS is ${installed}`)
          NODE

      - name: Remove temporary workflow and commit verified lock
        run: |
          rm .github/workflows/refresh-postcss-lock-once.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/web/package.json apps/web/package-lock.json .github/workflows/refresh-postcss-lock-once.yml
          git diff --cached --check
          git commit -m "Patch PostCSS advisory and refresh frontend lock"
          git push origin HEAD:release/0.1.1-redeploy
