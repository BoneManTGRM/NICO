name: Diagnose Express ValueError

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reproduce:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GITHUB_TOKEN: ${{ github.token }}
      NICO_ENABLE_HOSTED_SCANNER_AUTORUN: "true"
      NICO_ALLOW_PROJECT_COMMANDS: "true"
      NICO_ENABLE_FULL_HISTORY_SECRET_SCAN: "true"
      NICO_SCANNER_INSTALL_STRICT: "false"
      NICO_REQUIRE_DURABLE_DELIVERY_STORAGE: "false"
      NICO_TRUST_PROXY_HEADERS: "true"
      NICO_TOOL_TIMEOUT_SECONDS: "120"
      NICO_TOTAL_SCAN_TIMEOUT_SECONDS: "1500"
      NICO_OSV_TIMEOUT_SECONDS: "240"
      NICO_HISTORY_TOOL_TIMEOUT_SECONDS: "420"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Map production configuration and ValueError paths
        run: |
          SOURCE_MAP="$RUNNER_TEMP/express-source-map.txt"
          echo "SOURCE_MAP=$SOURCE_MAP" >> "$GITHUB_ENV"
          {
            echo '=== GitHub App and token references ==='
            grep -RInE 'GitHub App installation auth not configured|NICO_GITHUB|GITHUB_APP|installation_id|private_key' nico || true
            echo
            echo '=== ValueError and unguarded numeric environment parsing ==='
            grep -RInE 'ValueError|int\(os\.getenv|float\(os\.getenv|int\(.*getenv|float\(.*getenv' nico || true
          } > "$SOURCE_MAP"
      - name: Install production runtime dependencies
        run: |
          python -m pip install -r requirements.txt
          python scripts/install_hosted_scanner_binaries.py
      - name: Reproduce production Express collection
        id: reproduce
        continue-on-error: true
        run: |
          TRACE_PATH="$RUNNER_TEMP/express-reproduction.txt"
          echo "TRACE_PATH=$TRACE_PATH" >> "$GITHUB_ENV"
          python - <<'PY'
          import json
          import os
          import traceback
          from pathlib import Path

          import nico.api.production_bootstrap
          import nico.api.main as api_main

          payload = {
              "repository": "BoneManTGRM/NICO",
              "authorized": True,
              "authorization_confirmed": True,
              "client_name": "",
              "project_name": "",
              "assessment_mode": "express",
              "timeframe_days": 180,
              "customer_id": "default_customer",
              "project_id": "default_project",
              "authorized_by": "requester_confirmation",
              "authorization_scope": "repository assessment only",
              "refresh_full_evidence": True,
          }
          trace_path = Path(os.environ["RUNNER_TEMP"]) / "express-reproduction.txt"
          try:
              result = api_main.run_github_assessment(payload)
          except Exception:
              text = traceback.format_exc()
              trace_path.write_text(text, encoding="utf-8")
              print(text)
              raise
          summary = json.dumps({
              "status": result.get("status"),
              "repository": result.get("repository"),
              "collector_module": getattr(api_main.run_github_assessment, "__module__", ""),
              "collector_name": getattr(api_main.run_github_assessment, "__name__", ""),
              "section_count": len(result.get("sections") or []),
              "report_keys": sorted((result.get("reports") or {}).keys()),
              "unavailable_data_notes": result.get("unavailable_data_notes") or [],
          }, indent=2)
          trace_path.write_text(summary, encoding="utf-8")
          print(summary)
          if result.get("status") != "complete":
              raise SystemExit(f"Unexpected terminal status: {result.get('status')}")
          PY
      - name: Upload diagnostic evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: express-valueerror-diagnostics
          path: |
            ${{ env.SOURCE_MAP }}
            ${{ env.TRACE_PATH }}
          if-no-files-found: error
      - name: Preserve reproduction failure
        if: steps.reproduce.outcome == 'failure'
        run: exit 1
