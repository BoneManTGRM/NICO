name: Regenerate web lock temporary

on:
  push:
    branches:
      - fix/system-wide-audit-hardening-740
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  regenerate-lock:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact branch
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Regenerate package lock only
        working-directory: apps/web
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Collect patched dependency audit
        working-directory: apps/web
        run: npm audit --audit-level=high --omit=dev --json > ../../regenerated-web-npm-audit.json || true

      - name: Upload regenerated lock and audit
        uses: actions/upload-artifact@v7
        with:
          name: regenerated-web-package-lock
          path: |
            apps/web/package-lock.json
            regenerated-web-npm-audit.json
          if-no-files-found: error

      - name: Require zero high or critical production vulnerabilities
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('regenerated-web-npm-audit.json').read_text(encoding='utf-8'))
          counts = ((data.get('metadata') or {}).get('vulnerabilities') or {})
          high = int(counts.get('high') or 0)
          critical = int(counts.get('critical') or 0)
          if high or critical:
              raise SystemExit(f'production dependency audit remains unsafe: high={high}, critical={critical}')
          PY
