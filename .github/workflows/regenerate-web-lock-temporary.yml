name: Regenerate web lock temporary

on:
  push:
    branches:
      - fix/system-wide-audit-hardening-740
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate-lock:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Regenerate package lock only
        working-directory: apps/web
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Collect patched dependency audit
        working-directory: apps/web
        run: npm audit --omit=dev --json > ../../regenerated-web-npm-audit.json || true

      - name: Upload regenerated lock and audit
        uses: actions/upload-artifact@v7
        with:
          name: regenerated-web-package-lock
          path: |
            apps/web/package-lock.json
            regenerated-web-npm-audit.json
          if-no-files-found: error

      - name: Require zero known production vulnerabilities
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('regenerated-web-npm-audit.json').read_text(encoding='utf-8'))
          counts = ((data.get('metadata') or {}).get('vulnerabilities') or {})
          total = int(counts.get('total') or 0)
          if total:
              raise SystemExit(f'production dependency audit remains unsafe: total={total}')
          PY

      - name: Commit verified lock to branch
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/package-lock.json
          if git diff --cached --quiet; then
            echo "package-lock.json is already current"
          else
            git commit -m "Regenerate web lock with patched production dependencies"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
