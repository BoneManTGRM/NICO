name: Regenerate web lock temporary

on:
  push:
    branches:
      - fix/system-wide-audit-hardening-740
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  regenerate-lock:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact branch
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Regenerate package lock only
        working-directory: apps/web
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Verify patched production dependencies
        working-directory: apps/web
        run: npm audit --audit-level=high --omit=dev

      - name: Upload regenerated lock
        uses: actions/upload-artifact@v7
        with:
          name: regenerated-web-package-lock
          path: apps/web/package-lock.json
          if-no-files-found: error
