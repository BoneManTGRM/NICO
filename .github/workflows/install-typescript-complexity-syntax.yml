name: Install TypeScript Complexity Syntax

on:
  push:
    branches:
      - agent/remediate-all-296

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[typescript-complexity-wired]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/remediate-all-296
      - name: Wire runtime and evidence builder
        run: python scripts/install_typescript_complexity_syntax_once.py
      - name: Commit syntax correction wiring
        shell: bash
        run: |
          git config user.name "NICO Repair Automation"
          git config user.email "actions@users.noreply.github.com"
          git add nico/api/production.py scripts/build_complexity_manifest.py scripts/install_typescript_complexity_syntax_once.py .github/workflows/install-typescript-complexity-syntax.yml
          git commit -m "Wire TypeScript complexity syntax correction [typescript-complexity-wired]"
          git push origin HEAD:agent/remediate-all-296
