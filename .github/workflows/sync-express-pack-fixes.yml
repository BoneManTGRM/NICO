name: Sync Express Pack Fixes

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/sync-express-pack-fixes.yml

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Pull passing Express Pack fixes from branch
        run: |
          git fetch origin fix/ci-final-pytest-failures
          git checkout origin/fix/ci-final-pytest-failures -- \
            .github/workflows/nico-ci.yml \
            nico/assessment.py \
            nico/modules/express_pack.py \
            nico/modules/reporting.py \
            requirements.txt \
            tests/test_assessment_express_pack_wiring.py \
            tests/test_express_assessment_pack.py \
            tests/test_phase2_maturity.py \
            tests/test_phase3_evidence_manifest.py \
            tests/test_phase3_file_integrity.py

      - name: Source-clean APPSEC tuple on main
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("nico/cli.py")
          content = path.read_text(encoding="utf-8")
          old = '''(
                  "ai_agent_permission_drift",
                  "high",
                  "AI over-permission fixture",
                  "over_permissive_tools = True",
                  "Restrict AI-agent tools to least privilege.",
                  "OWASP-LLM-A06",
              ),'''
          new = '''(
                  "ai_agent_permission_drift",
                  "high",
                  "AI over-permission fixture",
                  "over_permissive_tools = True",
                  "Restrict AI-agent tools to least privilege.",
                  "Over-permissioned AI tools can exceed intended access boundaries.",
                  "OWASP-LLM-A06",
              ),'''

          if new not in content:
              assert content.count(old) == 1, "Target APPSEC tuple not found exactly once"
              content = content.replace(old, new, 1)

          assert len(content.splitlines()) > 900, "Refusing write: cli.py would be truncated"
          for required in [
              "from __future__ import annotations",
              "class Store",
              "def run_scan",
              "def apply_rye",
              "def repairs_for",
              "def generate_reports",
              "def scan_test_lab",
              "def scan_drift_demo",
              "def verify_latest",
              "def rye_score",
              "def main",
              "APPSEC_PATTERNS",
              "REPAIR_LIBRARY",
          ]:
              assert required in content, f"Refusing write: missing {required}"

          path.write_text(content, encoding="utf-8")
          print("cli.py source-cleaned")
          PY

      - name: Remove one-time workflow
        run: |
          git rm .github/workflows/sync-express-pack-fixes.yml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Verify synced fixes
        run: |
          python -m py_compile nico/cli.py nico/assessment.py nico/modules/express_pack.py nico/modules/reporting.py
          python -m pytest tests/ -v --tb=short

      - name: Commit synced fixes to main
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Sync passing Express Pack CI fixes to main"
          git push origin HEAD:main
