name: Temporary Final Score and Wording Verification

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: temporary-final-score-and-wording-verification
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Run one authorized production Express assessment
        id: verify
        continue-on-error: true
        env:
          NICO_PROXY: https://app.nicoaudit.com/api/nico
          NICO_REPOSITORY: BoneManTGRM/NICO
        run: |
          mkdir -p audit-results
          python - <<'PY'
          import json
          import os
          import time
          import urllib.error
          import urllib.request
          from pathlib import Path
          from typing import Any

          proxy = os.environ["NICO_PROXY"].rstrip("/")
          repository = os.environ["NICO_REPOSITORY"]
          scope = os.environ["GITHUB_RUN_ID"]
          customer_id = f"final_score_wording_{scope}"
          project_id = f"final_score_wording_{scope}_{os.environ['GITHUB_RUN_ATTEMPT']}"
          output = Path("audit-results/final-score-and-wording-verification.json")

          def post(path: str, body: dict[str, Any]) -> tuple[int, dict[str, Any]]:
              request = urllib.request.Request(
                  proxy + path,
                  data=json.dumps(body).encode("utf-8"),
                  method="POST",
                  headers={
                      "Content-Type": "application/json",
                      "User-Agent": "NICO-final-score-wording-verification",
                  },
              )
              try:
                  with urllib.request.urlopen(request, timeout=120) as response:
                      return response.status, json.load(response)
              except urllib.error.HTTPError as exc:
                  raw = exc.read().decode("utf-8", errors="replace")
                  try:
                      return exc.code, json.loads(raw)
                  except ValueError:
                      return exc.code, {"status": "error", "message": "non-JSON response"}

          def find_report(value: Any) -> dict[str, Any]:
              if isinstance(value, dict):
                  sections = value.get("sections")
                  if isinstance(sections, list) and any(
                      isinstance(item, dict) and item.get("id") == "velocity_complexity"
                      for item in sections
                  ):
                      return value
                  for nested in value.values():
                      found = find_report(nested)
                      if found:
                          return found
              elif isinstance(value, list):
                  for nested in value:
                      found = find_report(nested)
                      if found:
                          return found
              return {}

          def section(report: dict[str, Any], section_id: str) -> dict[str, Any]:
              return next(
                  (
                      item for item in report.get("sections") or []
                      if isinstance(item, dict) and item.get("id") == section_id
                  ),
                  {},
              )

          def detail_score(report: dict[str, Any], section_id: str) -> Any:
              details = report.get("score_details") if isinstance(report.get("score_details"), dict) else {}
              row = next(
                  (
                      item for item in details.get("sections") or []
                      if isinstance(item, dict) and item.get("id") == section_id
                  ),
                  {},
              )
              return row.get("score")

          request_body = {
              "repository": repository,
              "authorized": True,
              "authorization_confirmed": True,
              "authorized_by": "repository_owner_production_verification",
              "authorization_scope": "read-only repository assessment only",
              "client_name": "NICO final production score verification",
              "project_name": "NICO",
              "assessment_mode": "express",
              "timeframe_days": 180,
              "customer_id": customer_id,
              "project_id": project_id,
              "refresh_full_evidence": True,
          }
          start_http, started = post("/assessment/express-run", request_body)
          start_detail = started.get("detail") if isinstance(started.get("detail"), dict) else started
          run_id = str(started.get("run_id") or start_detail.get("run_id") or "")
          evidence: dict[str, Any] = {
              "repository": repository,
              "customer_id": customer_id,
              "project_id": project_id,
              "start_count": 1,
              "start_http_status": start_http,
              "run_id": run_id,
              "automatic_retry": False,
              "replacement_run": False,
          }
          if start_http >= 400 or not run_id.startswith("express_run_"):
              evidence["status"] = "start_failed"
              evidence["start_response"] = started
              output.write_text(json.dumps(evidence, indent=2), encoding="utf-8")
              raise SystemExit("Express assessment did not start")

          terminal_http = 0
          terminal: dict[str, Any] = {}
          deadline = time.monotonic() + 1800
          while time.monotonic() < deadline:
              time.sleep(5)
              terminal_http, terminal = post(
                  f"/assessment/express-run/{run_id}/status",
                  {"customer_id": customer_id, "project_id": project_id},
              )
              detail = terminal.get("detail") if isinstance(terminal.get("detail"), dict) else terminal
              status = str(detail.get("status") or terminal.get("status") or "").lower()
              print(f"run={run_id} http={terminal_http} status={status or 'unknown'}")
              if status in {"complete", "completed", "blocked", "failed", "error", "interrupted", "rejected"}:
                  break
          else:
              terminal_http = 504
              terminal = {"status": "timed_out"}

          detail = terminal.get("detail") if isinstance(terminal.get("detail"), dict) else terminal
          status = str(detail.get("status") or terminal.get("status") or "unknown")
          report = find_report(terminal)
          maturity = report.get("maturity_signal") if isinstance(report.get("maturity_signal"), dict) else {}
          score_details = report.get("score_details") if isinstance(report.get("score_details"), dict) else {}
          release = report.get("release_readiness") if isinstance(report.get("release_readiness"), dict) else {}
          reconciliation = report.get("final_score_reconciliation") if isinstance(report.get("final_score_reconciliation"), dict) else {}
          score_source = report.get("score_source_of_truth") if isinstance(report.get("score_source_of_truth"), dict) else {}
          section_ids = (
              "code_audit",
              "dependency_health",
              "secrets_review",
              "static_analysis",
              "ci_cd",
              "architecture_debt",
              "velocity_complexity",
          )
          visible_scores = {name: section(report, name).get("score") for name in section_ids}
          detail_scores = {name: detail_score(report, name) for name in section_ids}
          code = section(report, "code_audit")
          code_arrays = {
              key: code.get(key) or []
              for key in ("evidence", "verified_claims", "findings", "unavailable")
          }
          code_text = json.dumps(code_arrays, sort_keys=True).lower()
          explicit_absence_present = (
              "no test-path signals were found" in code_text
              or "no test path signals were found" in code_text
          )
          bounded_sample_metric_present = any(
              "test-path signals=0" in str(item).lower()
              for item in code.get("evidence") or []
          )
          recursive_tree_note_present = any(
              "recursive repository tree contains" in str(item).lower()
              for item in code.get("evidence") or []
          )

          summary = {
              "overall_score": maturity.get("score"),
              "maturity_level": maturity.get("level"),
              "score_details_score": score_details.get("score"),
              "visible_scores": visible_scores,
              "score_detail_scores": detail_scores,
              "release_readiness_status": release.get("status"),
              "release_readiness_missing_signals": release.get("missing_signals") or [],
              "final_score_reconciliation": reconciliation,
              "score_source_of_truth": score_source,
              "explicit_test_absence_present": explicit_absence_present,
              "bounded_sample_metric_present": bounded_sample_metric_present,
              "recursive_tree_note_present": recursive_tree_note_present,
              "executive_summary": report.get("executive_summary"),
              "human_review_required": report.get("human_review_required"),
              "client_ready": report.get("client_ready"),
          }
          evidence.update(
              {
                  "status": status,
                  "status_http_status": terminal_http,
                  "score_summary": summary,
                  "terminal_response": terminal,
              }
          )
          output.write_text(json.dumps(evidence, indent=2), encoding="utf-8")

          errors: list[str] = []
          if status.lower() not in {"complete", "completed"}:
              errors.append(f"terminal status={status}")
          if not report:
              errors.append("report missing")
          if int(maturity.get("score") or 0) < 92:
              errors.append(f"overall score={maturity.get('score')}")
          required = {
              "code_audit": 90,
              "dependency_health": 90,
              "secrets_review": 92,
              "static_analysis": 90,
              "ci_cd": 95,
              "architecture_debt": 94,
              "velocity_complexity": 90,
          }
          for name, minimum in required.items():
              if int(visible_scores.get(name) or 0) < minimum:
                  errors.append(f"{name}={visible_scores.get(name)}")
          if score_details.get("score") != maturity.get("score"):
              errors.append(f"score-details={score_details.get('score')} maturity={maturity.get('score')}")
          for name in section_ids:
              if visible_scores.get(name) != detail_scores.get(name):
                  errors.append(f"detail mismatch {name}: {visible_scores.get(name)} vs {detail_scores.get(name)}")
          if release.get("status") != "provisionally_ready_for_human_review":
              errors.append(f"release status={release.get('status')}")
          if release.get("missing_signals"):
              errors.append(f"missing signals={release.get('missing_signals')}")
          if explicit_absence_present:
              errors.append("contradicted standalone no-test claim remains")
          if not bounded_sample_metric_present:
              errors.append("bounded-sample test-path metric was removed")
          if not recursive_tree_note_present:
              errors.append("recursive-tree reconciliation note missing")
          if int(reconciliation.get("contradicted_test_absence_claims_removed") or 0) < 1:
              errors.append("test-absence cleanup metadata missing")
          if reconciliation.get("post_polish_applied") is not True:
              errors.append("post-polish reconciliation not applied")
          if score_source.get("final_stage") != "post_polish_score_reconciliation":
              errors.append(f"final score source={score_source.get('final_stage')}")
          if report.get("human_review_required") is not True:
              errors.append("human review guard missing")
          if report.get("client_ready") is not False:
              errors.append("client_ready guard changed")
          if errors:
              raise SystemExit("; ".join(errors))
          PY

      - name: Upload final verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-score-and-wording-verification
          path: audit-results/final-score-and-wording-verification.json
          if-no-files-found: error
          retention-days: 7

      - name: Preserve verification result
        if: always()
        run: test "${{ steps.verify.outcome }}" = "success"
