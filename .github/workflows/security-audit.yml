name: Security Audit Evidence

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  security-events: read

jobs:
  audit-evidence:
    name: Audit evidence collection
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Install application audit tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install isolated pinned Semgrep
        run: |
          python -m venv "$RUNNER_TEMP/nico-semgrep"
          "$RUNNER_TEMP/nico-semgrep/bin/python" -m pip install --upgrade pip
          "$RUNNER_TEMP/nico-semgrep/bin/pip" install semgrep==1.170.0
          mkdir -p "$RUNNER_TEMP/nico-tools-bin"
          ln -s "$RUNNER_TEMP/nico-semgrep/bin/semgrep" "$RUNNER_TEMP/nico-tools-bin/semgrep"
          echo "$RUNNER_TEMP/nico-tools-bin" >> "$GITHUB_PATH"

      - name: Install pinned scanner binaries strictly
        env:
          NICO_SCANNER_INSTALL_DIR: ${{ runner.temp }}/nico-scanners
          NICO_SCANNER_INSTALL_STRICT: "true"
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          mkdir -p "$NICO_SCANNER_INSTALL_DIR"
          python scripts/install_hosted_scanner_binaries.py
          echo "$NICO_SCANNER_INSTALL_DIR" >> "$GITHUB_PATH"

      - name: Collect pip-audit evidence
        run: |
          pip-audit -r requirements.txt --format json --output pip-audit.json || true
          test -s pip-audit.json || echo '{"status":"unavailable","reason":"pip-audit emitted no JSON"}' > pip-audit.json

      - name: Collect Bandit evidence
        run: |
          bandit -r nico -f json -o bandit.json || true
          test -s bandit.json || echo '{"results":[],"errors":["bandit emitted no JSON"]}' > bandit.json

      - name: Build Bandit triage evidence
        run: |
          python - <<'PY'
          from pathlib import Path
          import hashlib
          import json

          data = json.loads(Path('bandit.json').read_text(encoding='utf-8'))
          results = data.get('results') if isinstance(data, dict) else None
          if not isinstance(results, list):
              raise SystemExit('Bandit output is not a results object')
          items = []
          counts = {'blocking': 0, 'needs_review': 0, 'candidate_false_positive': 0}
          for item in results:
              if not isinstance(item, dict):
                  continue
              severity = str(item.get('issue_severity') or 'UNKNOWN').upper()
              confidence = str(item.get('issue_confidence') or 'UNKNOWN').upper()
              test_id = str(item.get('test_id') or 'unknown')
              filename = str(item.get('filename') or '')
              line_number = item.get('line_number')
              fingerprint = hashlib.sha256(
                  f'{test_id}|{filename}|{line_number}|{severity}|{confidence}'.encode()
              ).hexdigest()[:16]
              if severity in {'HIGH', 'CRITICAL'}:
                  disposition = 'blocking'
              elif severity == 'LOW':
                  disposition = 'candidate_false_positive'
              else:
                  disposition = 'needs_review'
              counts[disposition] += 1
              items.append({
                  'fingerprint': fingerprint,
                  'tool': 'bandit',
                  'rule_id': test_id,
                  'severity': severity,
                  'confidence': confidence,
                  'file': filename,
                  'line': line_number,
                  'disposition': disposition,
              })
          triage = {
              'schema': 'nico.bandit_triage.v1',
              'tool': 'bandit',
              'finding_count': len(items),
              **counts,
              'human_review_required': bool(items),
              'items': items,
          }
          Path('bandit-triage.json').write_text(
              json.dumps(triage, indent=2, sort_keys=True), encoding='utf-8'
          )
          PY

      - name: Collect Semgrep evidence
        run: |
          set +e
          semgrep scan --config auto --json --output semgrep.json 2>semgrep.stderr.txt
          status=$?
          set -e
          python - "$status" <<'PY'
          from pathlib import Path
          import json
          import sys

          status = int(sys.argv[1])
          path = Path('semgrep.json')
          try:
              data = json.loads(path.read_text(encoding='utf-8'))
          except Exception:
              data = None
          if not isinstance(data, dict) or not isinstance(data.get('results'), list) or not isinstance(data.get('errors'), list):
              reason = Path('semgrep.stderr.txt').read_text(encoding='utf-8', errors='replace')[-2000:]
              data = {'results': [], 'errors': [{'level': 'error', 'message': reason or f'exit {status}'}]}
              path.write_text(json.dumps(data, indent=2), encoding='utf-8')
          PY

      - name: Collect OSV Scanner evidence
        run: |
          set +e
          osv-scanner scan source -r . --format json > osv-scanner.json 2>osv-scanner.stderr.txt
          status=$?
          set -e
          python - "$status" <<'PY'
          from pathlib import Path
          import json
          import sys

          status = int(sys.argv[1])
          path = Path('osv-scanner.json')
          try:
              data = json.loads(path.read_text(encoding='utf-8'))
          except Exception:
              data = None
          if not isinstance(data, dict) or not isinstance(data.get('results'), list):
              reason = Path('osv-scanner.stderr.txt').read_text(encoding='utf-8', errors='replace')[-2000:]
              path.write_text(json.dumps({
                  'status': 'unavailable',
                  'reason': reason or f'exit {status}',
              }, indent=2), encoding='utf-8')
          PY

      - name: Collect gitleaks git-history evidence
        run: |
          set +e
          gitleaks detect --source . --report-format json --report-path gitleaks.json --no-banner --redact
          status=$?
          set -e
          python - "$status" <<'PY'
          from pathlib import Path
          import json
          import sys

          status = int(sys.argv[1])
          path = Path('gitleaks.json')
          if status == 0 and not path.exists():
              path.write_text('[]\n', encoding='utf-8')
          try:
              data = json.loads(path.read_text(encoding='utf-8'))
          except Exception:
              data = None
          valid = isinstance(data, list)
          findings = data if valid else []
          summary = {
              'scanner': 'gitleaks',
              'status': 'completed' if valid else 'unavailable',
              'finding_count': len(findings),
              'artifact_present': path.exists(),
              'history_depth': 'full',
              'exit_code': status,
          }
          Path('gitleaks-summary.json').write_text(json.dumps(summary, indent=2), encoding='utf-8')
          PY

      - name: Collect trufflehog git-history evidence
        run: |
          set +e
          trufflehog git "file://$PWD" --json --no-update > trufflehog.json 2>trufflehog.stderr.txt
          status=$?
          set -e
          python - "$status" <<'PY'
          from pathlib import Path
          import json
          import sys

          status = int(sys.argv[1])
          path = Path('trufflehog.json')
          raw = path.read_text(encoding='utf-8', errors='replace') if path.exists() else ''
          findings = []
          invalid_lines = 0
          for line in raw.splitlines():
              if not line.strip():
                  continue
              try:
                  value = json.loads(line)
              except json.JSONDecodeError:
                  invalid_lines += 1
                  continue
              if isinstance(value, dict):
                  findings.append(value)
              else:
                  invalid_lines += 1
          completed = invalid_lines == 0 and (status == 0 or bool(findings))
          summary = {
              'scanner': 'trufflehog',
              'status': 'completed' if completed else 'unavailable',
              'finding_count': len(findings),
              'artifact_present': path.exists(),
              'history_depth': 'full',
              'exit_code': status,
              'invalid_json_lines': invalid_lines,
          }
          Path('trufflehog-summary.json').write_text(json.dumps(summary, indent=2), encoding='utf-8')
          PY

      - name: Collect built-in high-confidence credential evidence
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import re

          skip = {'.git', 'node_modules', '.next', 'dist', 'build', '.venv', 'venv', '__pycache__'}
          suffixes = {'.py','.js','.jsx','.ts','.tsx','.json','.yaml','.yml','.toml','.ini','.cfg','.txt','.md','.sh','.html','.css','.xml','.env','.example'}
          patterns = {
              'private_key': re.compile(r'-----BEGIN (?:RSA |EC |OPENSSH |DSA )?PRIVATE KEY-----'),
              'github_token': re.compile(r'gh[pousr]_[A-Za-z0-9_]{20,}'),
              'aws_access_key': re.compile(r'AKIA[0-9A-Z]{16}'),
          }
          findings = []
          for path in Path('.').rglob('*'):
              if not path.is_file() or any(part in skip for part in path.parts):
                  continue
              if path.suffix not in suffixes and path.name not in {'Dockerfile','Procfile','.env.example'}:
                  continue
              text = path.read_text(encoding='utf-8', errors='replace')
              for line_number, line in enumerate(text.splitlines(), 1):
                  for finding_type, pattern in patterns.items():
                      if pattern.search(line):
                          findings.append({
                              'path': str(path),
                              'line': line_number,
                              'type': finding_type,
                          })
          Path('credential-scan.json').write_text(
              json.dumps({'findings': findings}, indent=2), encoding='utf-8'
          )
          PY

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install exact frontend dependencies
        working-directory: apps/web
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Collect TypeScript evidence
        working-directory: apps/web
        run: |
          set +e
          npm run lint > ../../typescript.txt 2>&1
          status=$?
          set -e
          python - "$status" <<'PY'
          from pathlib import Path
          import json
          import sys

          status = int(sys.argv[1])
          Path('../../typescript-summary.json').write_text(json.dumps({
              'scanner': 'typescript',
              'status': 'completed_clean' if status == 0 else 'completed_with_findings',
              'finding_count': 0 if status == 0 else 1,
              'artifact_present': True,
              'exit_code': status,
          }, indent=2), encoding='utf-8')
          PY

      - name: Collect honest ESLint evidence
        working-directory: apps/web
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import subprocess

          configs = [
              'eslint.config.js', 'eslint.config.mjs', 'eslint.config.cjs',
              '.eslintrc', '.eslintrc.js', '.eslintrc.cjs', '.eslintrc.json',
              '.eslintrc.yaml', '.eslintrc.yml',
          ]
          configured = any(Path(name).is_file() for name in configs)
          binary = Path('node_modules/.bin/eslint')
          if not configured:
              data = []
              summary = {
                  'scanner': 'eslint',
                  'status': 'unavailable_not_configured',
                  'configured': False,
                  'finding_count': 0,
                  'error_count': 0,
                  'warning_count': 0,
              }
          elif not binary.is_file():
              data = []
              summary = {
                  'scanner': 'eslint',
                  'status': 'unavailable',
                  'configured': True,
                  'finding_count': 0,
                  'error_count': 0,
                  'warning_count': 0,
                  'reason': 'local ESLint binary is unavailable',
              }
          else:
              result = subprocess.run(
                  [str(binary), '.', '--format', 'json'],
                  capture_output=True,
                  text=True,
                  timeout=180,
                  check=False,
              )
              try:
                  data = json.loads(result.stdout)
              except json.JSONDecodeError:
                  data = []
              messages = [
                  message
                  for file_result in data if isinstance(file_result, dict)
                  for message in file_result.get('messages') or [] if isinstance(message, dict)
              ]
              errors = sum(1 for message in messages if int(message.get('severity') or 0) == 2)
              warnings = sum(1 for message in messages if int(message.get('severity') or 0) == 1)
              summary = {
                  'scanner': 'eslint',
                  'status': 'completed_clean' if result.returncode == 0 else 'completed_with_findings',
                  'configured': True,
                  'finding_count': len(messages),
                  'error_count': errors,
                  'warning_count': warnings,
                  'exit_code': result.returncode,
              }
          Path('../../eslint.json').write_text(json.dumps(data, indent=2), encoding='utf-8')
          Path('../../eslint-summary.json').write_text(json.dumps(summary, indent=2), encoding='utf-8')
          PY

      - name: Collect npm audit evidence
        working-directory: apps/web
        run: npm audit --omit=dev --json > ../../npm-audit.json || true

      - name: Collect complexity evidence
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from nico.complexity_engine import build_complexity_profile

          Path('complexity-profile.json').write_text(
              json.dumps(build_complexity_profile(Path('.')), indent=2, sort_keys=True),
              encoding='utf-8',
          )
          PY

      - name: Build fail-closed scanner manifest
        if: always()
        run: python scripts/security_audit_gate.py

      - name: Upload audit evidence before enforcement
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: security-audit-evidence
          if-no-files-found: error
          path: |
            pip-audit.json
            bandit.json
            bandit-triage.json
            semgrep.json
            semgrep.stderr.txt
            osv-scanner.json
            osv-scanner.stderr.txt
            gitleaks.json
            gitleaks-summary.json
            trufflehog.json
            trufflehog-summary.json
            trufflehog.stderr.txt
            credential-scan.json
            npm-audit.json
            typescript.txt
            typescript-summary.json
            eslint.json
            eslint-summary.json
            complexity-profile.json
            scanner-worker-artifact.json
            security-gate.json

      - name: Require complete clean security evidence
        if: always()
        run: python scripts/security_audit_gate.py --enforce
