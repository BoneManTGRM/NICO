name: Apply Semantic Report Quality Repair

on:
  workflow_dispatch:
  push:
    branches:
      - fix/semantic-report-quality-contract
    paths:
      - .github/workflows/apply-semantic-report-quality.yml
      - scripts/apply_semantic_report_quality_patch.py

permissions:
  contents: write

concurrency:
  group: semantic-report-quality-repair
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: fix/semantic-report-quality-contract
          fetch-depth: 1

      - name: Apply and verify exact source transformations
        run: |
          python scripts/apply_semantic_report_quality_patch.py
          python -m py_compile \
            scripts/two_service_live_acceptance.py \
            nico/mid_assessment_report.py \
            nico/mid_report_professional_v4.py \
            nico/mid_report_professional_v6.py \
            nico/mid_report_professional_v7.py \
            nico/comprehensive_canonical_truth.py \
            nico/express_pdf_score_assurance_v1.py
          git diff --check

      - name: Commit verified non-workflow sources through Git data API
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          BRANCH: fix/semantic-report-quality-contract
        run: |
          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          import urllib.error
          import urllib.parse
          import urllib.request
          from pathlib import Path

          token = os.environ["GH_TOKEN"]
          repository = os.environ["REPOSITORY"]
          branch = os.environ["BRANCH"]
          paths = (
              "scripts/two_service_live_acceptance.py",
              "nico/comprehensive_canonical_truth.py",
              "nico/express_pdf_score_assurance_v1.py",
              "nico/mid_assessment_report.py",
              "nico/mid_report_professional_v4.py",
              "nico/mid_report_professional_v6.py",
              "nico/mid_report_professional_v7.py",
          )

          def api(method: str, path: str, payload=None):
              data = None if payload is None else json.dumps(payload).encode("utf-8")
              request = urllib.request.Request(
                  f"https://api.github.com/repos/{repository}{path}",
                  data=data,
                  method=method,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {token}",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "User-Agent": "nico-semantic-report-repair",
                      "Content-Type": "application/json",
                  },
              )
              try:
                  with urllib.request.urlopen(request, timeout=60) as response:
                      return json.loads(response.read().decode("utf-8"))
              except urllib.error.HTTPError as exc:
                  detail = exc.read().decode("utf-8", errors="replace")
                  raise SystemExit(f"GitHub API {method} {path} failed: HTTP {exc.code}: {detail}") from exc

          encoded_branch = urllib.parse.quote(branch, safe="")
          ref = api("GET", f"/git/ref/heads/{encoded_branch}")
          base_sha = str(ref["object"]["sha"])
          checkout_sha = os.environ.get("GITHUB_SHA", "")
          if checkout_sha and base_sha != checkout_sha:
              raise SystemExit(f"Branch moved during transformation: ref={base_sha} checkout={checkout_sha}")
          base_commit = api("GET", f"/git/commits/{base_sha}")
          base_tree = str(base_commit["tree"]["sha"])

          entries = []
          for path in paths:
              content = Path(path).read_text(encoding="utf-8")
              blob = api("POST", "/git/blobs", {"content": content, "encoding": "utf-8"})
              entries.append({"path": path, "mode": "100644", "type": "blob", "sha": blob["sha"]})

          tree = api("POST", "/git/trees", {"base_tree": base_tree, "tree": entries})
          commit = api(
              "POST",
              "/git/commits",
              {
                  "message": "Replace report page quotas with semantic quality contracts",
                  "tree": tree["sha"],
                  "parents": [base_sha],
              },
          )
          api("PATCH", f"/git/refs/heads/{encoded_branch}", {"sha": commit["sha"], "force": False})
          print(json.dumps({"base_sha": base_sha, "commit_sha": commit["sha"], "paths": list(paths)}, indent=2))
          PY
