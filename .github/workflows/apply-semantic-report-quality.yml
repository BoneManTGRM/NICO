name: Apply Semantic Report Quality Repair

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/apply-semantic-report-quality.yml
      - scripts/apply_semantic_report_quality_patch.py
  push:
    branches:
      - fix/semantic-report-quality-contract
    paths:
      - .github/workflows/apply-semantic-report-quality.yml
      - scripts/apply_semantic_report_quality_patch.py

permissions:
  contents: read

concurrency:
  group: semantic-report-quality-repair
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: fix/semantic-report-quality-contract
          fetch-depth: 1

      - name: Apply and verify exact source transformations
        run: |
          python scripts/apply_semantic_report_quality_patch.py
          python -m py_compile \
            scripts/two_service_live_acceptance.py \
            nico/mid_assessment_report.py \
            nico/mid_report_professional_v4.py \
            nico/mid_report_professional_v6.py \
            nico/mid_report_professional_v7.py \
            nico/comprehensive_canonical_truth.py
          git diff --check

      - name: Package verified transformed sources
        run: |
          mkdir -p semantic-report-quality
          while IFS= read -r path; do
            mkdir -p "semantic-report-quality/$(dirname "$path")"
            cp "$path" "semantic-report-quality/$path"
          done <<'EOF'
          scripts/two_service_live_acceptance.py
          .github/workflows/two-service-production-acceptance.yml
          nico/mid_assessment_report.py
          nico/mid_report_professional_v4.py
          nico/mid_report_professional_v6.py
          nico/mid_report_professional_v7.py
          nico/comprehensive_canonical_truth.py
          EOF
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path
          root = Path("semantic-report-quality")
          manifest = {}
          for path in sorted(item for item in root.rglob("*") if item.is_file()):
              relative = path.relative_to(root).as_posix()
              manifest[relative] = hashlib.sha256(path.read_bytes()).hexdigest()
          (root / "manifest.json").write_text(json.dumps(manifest, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY

      - uses: actions/upload-artifact@v7
        with:
          name: semantic-report-quality-transformed-sources
          path: semantic-report-quality
          if-no-files-found: error
          retention-days: 7
