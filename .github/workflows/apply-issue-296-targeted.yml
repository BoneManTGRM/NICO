name: Apply Issue 296 Targeted Repairs

on:
  push:
    branches: [agent/remediate-all-296]
    paths:
      - scripts/apply_issue_296_targeted.py

permissions:
  contents: write

jobs:
  apply-targeted-repairs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/remediate-all-296
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Apply deterministic source repairs
        run: |
          python scripts/apply_issue_296_targeted.py
          python -m py_compile nico/no_server_assessment.py nico/cli.py
      - name: Commit repaired source
        run: |
          git config user.name "NICO Repair Bot"
          git config user.email "actions@users.noreply.github.com"
          git add nico/no_server_assessment.py nico/cli.py
          if git diff --cached --quiet; then
            echo "Targeted repairs were already applied."
          else
            git commit -m "Repair archive extraction and static SQL dispatch"
            git push origin HEAD:agent/remediate-all-296
          fi
