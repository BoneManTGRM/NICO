name: One-time PostCSS lock repair

on:
  push:
    branches:
      - release/0.1.1-redeploy
    paths:
      - apps/web/package.json
      - .github/workflows/one-time-postcss-lock-repair.yml

permissions:
  contents: write

concurrency:
  group: one-time-postcss-lock-repair
  cancel-in-progress: false

jobs:
  repair:
    name: Regenerate and verify patched frontend lockfile
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out release branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: release/0.1.1-redeploy
          fetch-depth: 1

      - name: Set up Node 20
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Regenerate exact lockfile and verify production audit
        working-directory: apps/web
        run: |
          npm install --package-lock-only --ignore-scripts --no-fund --no-audit
          npm ci --ignore-scripts --no-fund --no-audit
          npm audit --omit=dev --audit-level=high
          node - <<'NODE'
          const lock = require('./package-lock.json');
          const postcss = lock.packages?.['node_modules/postcss'];
          if (!postcss || postcss.version !== '8.5.13') {
            throw new Error(`Expected postcss 8.5.13, found ${postcss?.version || 'missing'}`);
          }
          NODE

      - name: Remove one-time workflow and commit verified lockfile
        run: |
          rm .github/workflows/one-time-postcss-lock-repair.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A apps/web/package.json apps/web/package-lock.json .github/workflows/one-time-postcss-lock-repair.yml
          git diff --cached --quiet && { echo "No lockfile repair was produced"; exit 1; }
          git commit -m "Regenerate lockfile with patched PostCSS 8.5.13"
          git push origin HEAD:release/0.1.1-redeploy
