name: Temporary Secure Professional PDF Production Verification

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PDF reader
        run: python -m pip install --disable-pip-version-check pypdf==6.14.2

      - name: Verify deployed assessment, dependency proof, and PDF presentation
        env:
          NICO_PROXY: https://app.nicoaudit.com/api/nico
          NICO_REPOSITORY: BoneManTGRM/NICO
        run: |
          mkdir -p verification
          python - <<'PY'
          import base64
          import io
          import json
          import os
          import time
          import urllib.error
          import urllib.request
          from pathlib import Path
          from typing import Any

          from pypdf import PdfReader

          proxy = os.environ["NICO_PROXY"].rstrip("/")
          repository = os.environ["NICO_REPOSITORY"]
          scope = os.environ["GITHUB_RUN_ID"]
          customer_id = f"secure_professional_pdf_{scope}"
          project_id = f"secure_professional_pdf_{scope}_{os.environ['GITHUB_RUN_ATTEMPT']}"
          json_path = Path("verification/secure-professional-pdf.json")
          pdf_path = Path("verification/secure-professional-pdf.pdf")
          text_path = Path("verification/secure-professional-pdf.txt")

          def post(path: str, payload: dict[str, Any]) -> tuple[int, dict[str, Any]]:
              request = urllib.request.Request(
                  proxy + path,
                  data=json.dumps(payload).encode("utf-8"),
                  method="POST",
                  headers={"Content-Type": "application/json", "User-Agent": "NICO-secure-professional-pdf-verification"},
              )
              try:
                  with urllib.request.urlopen(request, timeout=180) as response:
                      return response.status, json.load(response)
              except urllib.error.HTTPError as exc:
                  raw = exc.read().decode("utf-8", errors="replace")
                  try:
                      return exc.code, json.loads(raw)
                  except ValueError:
                      return exc.code, {"status": "error", "message": "non-JSON response"}

          def find_report(value: Any) -> dict[str, Any]:
              if isinstance(value, dict):
                  if isinstance(value.get("sections"), list) and isinstance(value.get("reports"), dict) and isinstance(value.get("maturity_signal"), dict):
                      return value
                  for nested in value.values():
                      found = find_report(nested)
                      if found:
                          return found
              elif isinstance(value, list):
                  for nested in value:
                      found = find_report(nested)
                      if found:
                          return found
              return {}

          start_http, started = post(
              "/assessment/express-run",
              {
                  "repository": repository,
                  "authorized": True,
                  "authorization_confirmed": True,
                  "authorized_by": "repository_owner_secure_professional_pdf_verification",
                  "authorization_scope": "read-only repository assessment and report verification only",
                  "client_name": "NICO secure professional PDF verification",
                  "project_name": "NICO",
                  "assessment_mode": "express",
                  "timeframe_days": 180,
                  "customer_id": customer_id,
                  "project_id": project_id,
                  "refresh_full_evidence": True,
              },
          )
          detail = started.get("detail") if isinstance(started.get("detail"), dict) else started
          run_id = str(started.get("run_id") or detail.get("run_id") or "")
          if start_http >= 400 or not run_id.startswith("express_run_"):
              json_path.write_text(json.dumps({"start_http": start_http, "start_response": started}, indent=2), encoding="utf-8")
              raise SystemExit("Express assessment did not start")

          terminal_http = 0
          terminal: dict[str, Any] = {}
          deadline = time.monotonic() + 2100
          while time.monotonic() < deadline:
              time.sleep(5)
              terminal_http, terminal = post(
                  f"/assessment/express-run/{run_id}/status",
                  {"customer_id": customer_id, "project_id": project_id},
              )
              detail = terminal.get("detail") if isinstance(terminal.get("detail"), dict) else terminal
              status = str(detail.get("status") or terminal.get("status") or "").lower()
              print(f"run={run_id} http={terminal_http} status={status or 'unknown'}")
              if status in {"complete", "completed", "blocked", "failed", "error", "interrupted", "rejected"}:
                  break
          else:
              terminal = {"status": "timed_out"}

          detail = terminal.get("detail") if isinstance(terminal.get("detail"), dict) else terminal
          status = str(detail.get("status") or terminal.get("status") or "unknown").lower()
          report = find_report(terminal)
          sections = [item for item in report.get("sections", []) or [] if isinstance(item, dict)]
          dependency = next((item for item in sections if item.get("id") == "dependency_health"), {})
          maturity = report.get("maturity_signal") if isinstance(report.get("maturity_signal"), dict) else {}
          reports = report.get("reports") if isinstance(report.get("reports"), dict) else {}
          pdf_meta = report.get("report_intelligence_pdf") if isinstance(report.get("report_intelligence_pdf"), dict) else {}
          professional = report.get("professional_report_intelligence_export") if isinstance(report.get("professional_report_intelligence_export"), dict) else {}
          export = report.get("report_intelligence_export") if isinstance(report.get("report_intelligence_export"), dict) else {}
          reconciliation = report.get("repair_intelligence_reconciliation") if isinstance(report.get("repair_intelligence_reconciliation"), dict) else {}
          repairs = report.get("repair_intelligence") if isinstance(report.get("repair_intelligence"), dict) else {}
          quality = report.get("repository_quality_signals") if isinstance(report.get("repository_quality_signals"), dict) else {}
          groups = quality.get("groups") if isinstance(quality.get("groups"), dict) else {}
          branch = groups.get("branch_hygiene") if isinstance(groups.get("branch_hygiene"), dict) else {}
          runtime_patch = groups.get("runtime_patch_surface") if isinstance(groups.get("runtime_patch_surface"), dict) else {}
          frontend = groups.get("frontend_routes") if isinstance(groups.get("frontend_routes"), dict) else {}
          candidates = [item for item in repairs.get("candidates", []) or [] if isinstance(item, dict)]
          titles = [str(item.get("title") or "") for item in candidates]
          categories = [str(item.get("category") or "") for item in candidates]

          pdf_base64 = str(reports.get("pdf_base64") or "")
          pdf_text = ""
          page_count = 0
          pdf_size = 0
          if pdf_base64:
              pdf_bytes = base64.b64decode(pdf_base64)
              pdf_path.write_bytes(pdf_bytes)
              pdf_size = len(pdf_bytes)
              reader = PdfReader(io.BytesIO(pdf_bytes))
              page_count = len(reader.pages)
              pdf_text = "\n".join(page.extract_text() or "" for page in reader.pages)
              text_path.write_text(pdf_text, encoding="utf-8")

          summary = {
              "status": status,
              "run_id": run_id,
              "overall_score": maturity.get("score"),
              "dependency_score": dependency.get("score"),
              "dependency_status": dependency.get("status"),
              "dependency_findings": dependency.get("findings") or [],
              "pdf_style": reports.get("pdf_style"),
              "pdf_pages": page_count,
              "pdf_size": pdf_size,
              "report_intelligence_pdf": pdf_meta,
              "professional_report_intelligence_export": professional,
              "report_intelligence_export": export,
              "repair_intelligence_reconciliation": reconciliation,
              "branch_count": branch.get("branch_count"),
              "route_alias_count": len(frontend.get("route_aliases") or []),
              "explicit_placeholder_count": len(frontend.get("explicit_placeholders") or []),
              "runtime_patch_module_count": runtime_patch.get("patch_compat_fallback_count"),
              "runtime_installer_call_count": runtime_patch.get("package_installer_call_count"),
              "repair_candidate_count": repairs.get("candidate_count"),
              "code_suggestion_count": repairs.get("code_suggestion_count"),
              "candidate_titles": titles,
              "candidate_categories": categories,
              "human_review_required": report.get("human_review_required"),
              "client_ready": report.get("client_ready"),
          }
          json_path.write_text(json.dumps({"summary": summary, "terminal_response": terminal}, indent=2), encoding="utf-8")

          errors: list[str] = []
          if status not in {"complete", "completed"}:
              errors.append(f"terminal status={status}")
          if int(maturity.get("score") or 0) < 92:
              errors.append(f"overall score={maturity.get('score')}")
          if int(dependency.get("score") or 0) < 90 or str(dependency.get("status") or "") != "green":
              errors.append(f"dependency section={dependency.get('status')} {dependency.get('score')}")
          dependency_text = json.dumps({"findings": dependency.get("findings") or [], "evidence": dependency.get("evidence") or []}).lower()
          if "pypdf@5.9.0" in dependency_text or "pypdf@6.14.2" in " ".join(str(item).lower() for item in dependency.get("findings") or []):
              errors.append(f"pypdf vulnerability finding remains: {dependency.get('findings')}")
          if reports.get("pdf_style") != "professional_report_v11_intelligence":
              errors.append(f"PDF style={reports.get('pdf_style')}")
          if pdf_meta.get("status") != "complete" or pdf_meta.get("structured_appendix") is not True or pdf_meta.get("raw_markdown_rendered") is not False:
              errors.append(f"PDF metadata={pdf_meta}")
          if professional.get("status") != "complete" or professional.get("structured_appendix") is not True or professional.get("raw_markdown_rendered") is not False:
              errors.append(f"professional export={professional}")
          if export.get("status") != "complete" or export.get("score_changed") is not False:
              errors.append(f"intelligence export={export}")
          if reconciliation.get("status") != "reconciled" or reconciliation.get("early_source_regex_candidates_carried_forward") is not False:
              errors.append(f"repair reconciliation={reconciliation}")
          if not pdf_base64 or pdf_size < 5000 or page_count < 8:
              errors.append(f"PDF size/pages invalid: {pdf_size}/{page_count}")

          for marker in (
              "Repository Quality and Repair Intelligence",
              "Repository Quality and Governance Signals",
              "Prioritized Repair Intelligence",
              "Branch governance",
              "Runtime patch surface",
              "Suggested replacement code - not applied and not yet verified",
          ):
              if marker not in pdf_text:
                  errors.append(f"PDF missing structured text: {marker}")
          for marker in (
              "## Repository Quality and Governance Signals",
              "## Prioritized Repair Intelligence",
              "**Report-only safety boundary:**",
              "```python",
              "```",
          ):
              if marker in pdf_text:
                  errors.append(f"raw Markdown leaked into PDF: {marker}")

          if not isinstance(branch.get("branch_count"), int) or int(branch.get("branch_count") or 0) < 100:
              errors.append(f"branch inventory={branch.get('branch_count')}")
          if len(frontend.get("route_aliases") or []) < 1 or frontend.get("explicit_placeholders"):
              errors.append("frontend route classification incorrect")
          if int(runtime_patch.get("patch_compat_fallback_count") or 0) < 20:
              errors.append("runtime patch surface missing")
          if int(repairs.get("candidate_count") or 0) < 1 or int(repairs.get("code_suggestion_count") or 0) < 1:
              errors.append("repair intelligence incomplete")
          if any(category == "secret_exposure" for category in categories):
              errors.append(f"contradicted secret candidate remains: {titles}")
          if any("pypdf@5.9.0" in title.lower() or "pypdf@6.14.2" in title.lower() for title in titles):
              errors.append(f"pypdf dependency candidate remains: {titles}")
          if report.get("human_review_required") is not True or report.get("client_ready") is not False:
              errors.append("review/client-ready guard changed")
          if professional.get("code_changes_applied") is not False or professional.get("automatic_application_allowed") is not False:
              errors.append("no-write guard changed")

          if errors:
              raise SystemExit("; ".join(errors))
          PY

      - name: Upload final production evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secure-professional-pdf-production-verification
          path: verification/
          if-no-files-found: error
          retention-days: 7
