name: NICO CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"

    - name: Set up Node
      uses: actions/setup-node@v7
      with:
        node-version: "20"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install --no-deps -e .

    - name: Verify package entry points
      run: |
        set +e
        {
          nico --help
          python - <<'PY'
        from importlib.metadata import entry_points
        from nico.api.production import app
        from nico.api_runner import main as api_main

        scripts = {item.name: item.value for item in entry_points(group="console_scripts")}
        assert scripts.get("nico") == "nico.__main__:main"
        assert scripts.get("nico-api") == "nico.api_runner:main"
        assert app is not None
        assert callable(api_main)
        print("NICO package entry points and complete production API import verified.")
        PY
        } > entrypoint-debug.log 2>&1
        status=$?
        cat entrypoint-debug.log
        exit $status

    - name: Upload entrypoint debug
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: entrypoint-debug
        path: entrypoint-debug.log

    - name: Install frontend dependencies
      working-directory: apps/web
      run: npm install --legacy-peer-deps

    - name: Run frontend typecheck
      working-directory: apps/web
      run: npm run lint

    - name: Run frontend production build
      working-directory: apps/web
      run: npm run build

    - name: Compile critical files
      run: |
        python -m py_compile nico/assessment.py
        python -m py_compile nico/cli.py
        python -m py_compile nico/api/main.py
        python -m py_compile nico/hosted_assessment.py
        python -m py_compile nico/service_workflows.py
        python -m py_compile nico/storage.py
        python -m py_compile nico/scanner_worker.py
        python -m py_compile nico/evidence.py
        python -m py_compile nico/approval_queue.py
        python -m py_compile nico/repair_intelligence.py
        python -m py_compile nico/reports.py
        python -m py_compile nico/github_app.py
        python -m py_compile nico/customer_access.py
        python -m py_compile nico/tenancy.py
        python -m py_compile nico/modules/reporting.py
        python -m py_compile nico/modules/dependency_audit.py
        python -m py_compile nico/modules/synthesis.py
        python -m py_compile nico/modules/maturity.py
        python -m py_compile nico/modules/roadmap.py
        python -m py_compile nico/modules/express_pack.py

    - name: Run Python dependency audit evidence
      run: |
        mkdir -p audit-results
        python -m pip_audit --format json --output audit-results/pip-audit-results.json || true
        test -f audit-results/pip-audit-results.json || echo '{"status":"pip-audit unavailable"}' > audit-results/pip-audit-results.json

    - name: Verify hosted scanner installer strictly
      env:
        GITHUB_TOKEN: ${{ github.token }}
        NICO_SCANNER_INSTALL_STRICT: "true"
      run: |
        export NICO_SCANNER_INSTALL_DIR="$RUNNER_TEMP/nico-scanners"
        export PATH="$NICO_SCANNER_INSTALL_DIR:$PATH"
        python scripts/install_hosted_scanner_binaries.py
        command -v osv-scanner
        command -v gitleaks
        command -v trufflehog

    - name: Run Docker build check
      run: |
        docker build -t nico-ci:ci .
        docker run --rm --entrypoint sh nico-ci:ci -c 'test -w /data && command -v nico && command -v nico-api && python -c "from nico.api.production import app; assert app"'

    - name: Run file integrity regression test
      run: |
        python -m pytest tests/test_phase3_file_integrity.py -v

    - name: Run all tests
      run: |
        python -m pytest tests/ -v --tb=short --junitxml=pytest-results.xml

    - name: Upload pytest results
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: pytest-results
        path: pytest-results.xml

    - name: Upload audit results
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: audit-results
        path: audit-results/
