name: One-shot Production Express Diagnostic

on:
  push:
    branches: [main]

permissions:
  contents: read
  statuses: write

concurrency:
  group: one-shot-production-express-diagnostic
  cancel-in-progress: false

jobs:
  diagnose:
    if: contains(github.event.head_commit.message, 'Run public-proxy production Express diagnostic')
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      GITHUB_TOKEN: ${{ github.token }}
      NICO_PUBLIC_PROXY_URL: https://app.nicoaudit.com/api/nico
      NICO_AUTHORIZED_REPOSITORY: BoneManTGRM/NICO
      NICO_BACKEND_STATUS_CONTEXT: successful-cat - NICO
    steps:
      - name: Wait for exact Vercel and Railway deployment statuses
        run: |
          python - <<'PY'
          import json
          import os
          import time
          import urllib.request

          repository = os.environ["GITHUB_REPOSITORY"]
          sha = os.environ["GITHUB_SHA"]
          token = os.environ["GITHUB_TOKEN"]
          required = {"Vercel", os.environ["NICO_BACKEND_STATUS_CONTEXT"]}
          deadline = time.monotonic() + 1200
          while time.monotonic() < deadline:
              request = urllib.request.Request(
                  f"https://api.github.com/repos/{repository}/commits/{sha}/status",
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {token}",
                      "User-Agent": "NICO-one-shot-production-diagnostic",
                  },
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  payload = json.load(response)
              states = {str(item.get("context")): str(item.get("state")) for item in payload.get("statuses", [])}
              failed = {context: states.get(context) for context in required if states.get(context) in {"failure", "error"}}
              if failed:
                  raise SystemExit(f"Deployment status failed: {failed}")
              if all(states.get(context) == "success" for context in required):
                  print(f"Exact commit deployed: {sha}; contexts={sorted(required)}")
                  break
              print(f"Waiting for exact deployment statuses: {states}")
              time.sleep(15)
          else:
              raise SystemExit("Timed out waiting for exact Vercel and Railway deployment statuses")
          PY

      - name: Start exactly one Express run and publish bounded terminal evidence
        id: diagnostic
        continue-on-error: true
        run: |
          mkdir -p audit-results
          python - <<'PY'
          import json
          import os
          import time
          import urllib.error
          import urllib.request
          from pathlib import Path

          proxy = os.environ["NICO_PUBLIC_PROXY_URL"].rstrip("/")
          repository = os.environ["NICO_AUTHORIZED_REPOSITORY"]
          github_repository = os.environ["GITHUB_REPOSITORY"]
          github_sha = os.environ["GITHUB_SHA"]
          github_token = os.environ["GITHUB_TOKEN"]
          actions_run_id = os.environ["GITHUB_RUN_ID"]
          run_url = f"https://github.com/{github_repository}/actions/runs/{actions_run_id}"
          customer_id = f"express_diagnostic_{actions_run_id}"
          project_id = f"express_diagnostic_{actions_run_id}_{os.environ['GITHUB_RUN_ATTEMPT']}"
          output = Path("audit-results/production-express-diagnostic.json")

          def publish_status(label: str, state: str, description: str) -> None:
              context = f"NICO Express Diagnostic | {label}"[:100]
              payload = json.dumps({
                  "state": state,
                  "context": context,
                  "description": description[:140],
                  "target_url": run_url,
              }).encode("utf-8")
              request = urllib.request.Request(
                  f"https://api.github.com/repos/{github_repository}/statuses/{github_sha}",
                  data=payload,
                  method="POST",
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {github_token}",
                      "Content-Type": "application/json",
                      "User-Agent": "NICO-one-shot-production-diagnostic",
                  },
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  json.load(response)
              print(f"Published bounded diagnostic status: {context}")

          def post(path: str, body: dict) -> tuple[int, dict]:
              request = urllib.request.Request(
                  proxy + path,
                  data=json.dumps(body).encode("utf-8"),
                  method="POST",
                  headers={"Content-Type": "application/json", "User-Agent": "NICO-one-shot-production-diagnostic"},
              )
              try:
                  with urllib.request.urlopen(request, timeout=120) as response:
                      return response.status, json.load(response)
              except urllib.error.HTTPError as exc:
                  raw = exc.read().decode("utf-8", errors="replace")
                  try:
                      payload = json.loads(raw)
                  except ValueError:
                      payload = {"status": "error", "message": "Production proxy returned a non-JSON terminal response."}
                  return exc.code, payload

          request_payload = {
              "repository": repository,
              "authorized": True,
              "authorization_confirmed": True,
              "client_name": "NICO production diagnostic",
              "project_name": "NICO",
              "assessment_mode": "express",
              "timeframe_days": 180,
              "customer_id": customer_id,
              "project_id": project_id,
              "authorized_by": "repository_owner_production_diagnostic",
              "authorization_scope": "read-only repository assessment only",
              "refresh_full_evidence": True,
          }
          try:
              start_status, started = post("/assessment/express-run", request_payload)
          except Exception as exc:
              evidence = {"status": "transport_failed", "start_count": 1, "exception_class": type(exc).__name__}
              output.write_text(json.dumps(evidence, indent=2), encoding="utf-8")
              publish_status("transport_failed", "error", f"Production proxy transport failed: {type(exc).__name__}")
              raise

          start_detail = started.get("detail") if isinstance(started.get("detail"), dict) else started
          run_id = str(started.get("run_id") or start_detail.get("run_id") or "")
          evidence = {
              "commit_sha": github_sha,
              "repository": repository,
              "customer_id": customer_id,
              "project_id": project_id,
              "start_count": 1,
              "start_http_status": start_status,
              "start_response": started,
              "run_id": run_id,
              "automatic_retry": False,
              "replacement_run": False,
          }
          if start_status >= 400 or not run_id.startswith("express_run_"):
              label = str(start_detail.get("code") or "start_failed")
              evidence["status"] = "start_failed"
              output.write_text(json.dumps(evidence, indent=2), encoding="utf-8")
              publish_status(label, "error", f"Express start failed with HTTP {start_status}")
              raise SystemExit("Express diagnostic start failed")

          deadline = time.monotonic() + 1200
          terminal_http = 0
          terminal: dict = {}
          while time.monotonic() < deadline:
              time.sleep(3)
              terminal_http, terminal = post(
                  f"/assessment/express-run/{run_id}/status",
                  {"customer_id": customer_id, "project_id": project_id},
              )
              detail = terminal.get("detail") if isinstance(terminal.get("detail"), dict) else terminal
              status = str(detail.get("status") or terminal.get("status") or "").lower()
              print(f"run={run_id} http={terminal_http} status={status or 'unknown'}")
              if status in {"complete", "completed", "blocked", "failed", "error", "interrupted", "rejected"}:
                  break
          else:
              terminal_http = 504
              terminal = {"status": "timed_out", "message": "Bounded production diagnostic polling expired."}

          evidence["status_http_status"] = terminal_http
          evidence["terminal_response"] = terminal
          detail = terminal.get("detail") if isinstance(terminal.get("detail"), dict) else terminal
          status = str(detail.get("status") or terminal.get("status") or "unknown").lower()
          evidence["status"] = status
          output.write_text(json.dumps(evidence, indent=2), encoding="utf-8")
          if status in {"complete", "completed"}:
              publish_status("complete", "success", f"Express completed under exact run {run_id}")
              raise SystemExit(0)

          label = str(
              detail.get("safe_failure_location")
              or detail.get("failure_module")
              or detail.get("code")
              or status
              or "unknown_failure"
          )
          publish_status(label, "error", f"Express {status}; HTTP {terminal_http}; exact run {run_id}")
          raise SystemExit(f"Express diagnostic ended with {status}")
          PY

      - name: Upload exact production terminal evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: one-shot-production-express-diagnostic-${{ github.run_id }}
          path: audit-results/production-express-diagnostic.json
          if-no-files-found: error
          retention-days: 30

      - name: Preserve diagnostic result
        if: always()
        run: test "${{ steps.diagnostic.outcome }}" = "success"
