name: Postgres Restart Proof

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: postgres-restart-proof-${{ github.ref }}
  cancel-in-progress: true

jobs:
  restart-proof:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nico
          POSTGRES_PASSWORD: nico
          POSTGRES_DB: nico
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U nico -d nico"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12
    env:
      NICO_TEST_DATABASE_URL: postgresql://nico:nico@127.0.0.1:5432/nico
      PYTHONPATH: .
    steps:
      - name: Check out exact commit
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install NICO runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run synthetic restart and tenant-isolation proof
        run: |
          python scripts/postgres_restart_proof.py \
            --database-url "$NICO_TEST_DATABASE_URL" \
            --output audit-results/postgres-restart-proof.json

      - name: Verify evidence is bounded and passing
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("audit-results/postgres-restart-proof.json")
          payload = json.loads(path.read_text(encoding="utf-8"))
          assert payload["status"] == "passed"
          assert payload["synthetic"] is True
          assert payload["live_production_claim"] is False
          assert payload["proof"]["fresh_adapter_reconnected"] is True
          assert payload["proof"]["exact_tenant_scope_preserved"] is True
          assert payload["proof"]["human_approval_unchanged"] is True
          serialized = json.dumps(payload)
          assert "postgresql://" not in serialized
          assert "NICO_TEST_DATABASE_URL" not in serialized
          PY

      - name: Upload restart proof evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: postgres-restart-proof-${{ github.run_id }}-${{ github.run_attempt }}
          path: audit-results/postgres-restart-proof.json
          if-no-files-found: error
          retention-days: 30
