name: Refresh Mid Handler Identity Test

on:
  push:
    branches:
      - agent/remediate-all-296

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[mid-handler-test-refreshed]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/remediate-all-296
      - name: Refresh identity assertion
        run: python scripts/refresh_mid_handler_identity_test.py
      - name: Commit refreshed test
        shell: bash
        run: |
          git config user.name "NICO Repair Automation"
          git config user.email "actions@users.noreply.github.com"
          git add tests/test_mid_assessment_api.py scripts/refresh_mid_handler_identity_test.py .github/workflows/refresh-mid-handler-identity-test.yml
          git commit -m "Refresh Mid handler identity test [mid-handler-test-refreshed]"
          git push origin HEAD:agent/remediate-all-296
