name: Node.js CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "apps/web/**"
  push:
    branches:
      - upgrade/repair-first-foundation
    paths:
      - "apps/web/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm install

      - name: Lint frontend
        working-directory: apps/web
        run: npm run lint

      - name: Build frontend
        working-directory: apps/web
        run: npm run build
