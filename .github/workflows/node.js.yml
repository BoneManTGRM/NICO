name: Node.js CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "apps/web/**"
  push:
    branches:
      - upgrade/repair-first-foundation
    paths:
      - "apps/web/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm install

      - name: Generate npm audit evidence
        working-directory: apps/web
        run: |
          mkdir -p ../../audit-results
          npm audit --audit-level=high --json > ../../audit-results/npm-audit-results.json || true
          test -f ../../audit-results/npm-audit-results.json || echo '{"status":"npm audit unavailable"}' > ../../audit-results/npm-audit-results.json

      - name: Lint frontend
        working-directory: apps/web
        run: npm run lint

      - name: Build frontend
        working-directory: apps/web
        run: npm run build

      - name: Upload frontend audit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-audit-results
          path: audit-results/
