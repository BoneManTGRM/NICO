name: Apply Professional Workspace Patch

# One-time assertion-bound transformation. This workflow removes itself after success.
on:
  pull_request:
    branches:
      - main
    paths:
      - scripts/apply_professional_workspace_patch.py
      - .github/workflows/apply-professional-workspace-patch.yml

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: professional-workspace-patch-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: fix/professional-ui-polish
          fetch-depth: 1

      - name: Apply assertion-bound source transformation
        run: python scripts/apply_professional_workspace_patch.py

      - name: Compile generated UI contract
        run: python -m py_compile tests/test_professional_assessment_ui.py

      - name: Verify complete status vocabulary
        run: |
          python - <<'PY'
          from pathlib import Path
          source = Path('apps/web/app/assessment/AssessmentWorkspace.tsx').read_text(encoding='utf-8')
          required = (
              'Awaiting stage',
              'Awaiting scanner completion',
              'Begins after automated report',
              'Calculated after scoring',
              'Not scored yet',
              'Review limited · Not scored',
              'Baseline not established',
              'Input not provided',
              'Not applicable',
              'Runtime acceptance not provided',
              'Awaiting commercial inputs',
          )
          missing = [item for item in required if item not in source]
          if missing:
              raise SystemExit('Missing status copy: ' + ', '.join(missing))
          PY

      - name: Verify centralized status formatter
        run: grep -Fq 'function formatStatus' apps/web/app/assessment/AssessmentWorkspace.tsx

      - name: Verify legacy timeline status renderer removed
        run: '! grep -Fq "{item.status || copy.notVerified}" apps/web/app/assessment/AssessmentWorkspace.tsx'

      - name: Verify legacy section badge renderer removed
        run: '! grep -Fq "{state} · {label}" apps/web/app/assessment/AssessmentWorkspace.tsx'

      - name: Verify raw review-limited enum is hidden
        run: '! grep -Fq "REVIEW_LIMITED_NOT_SCORED" apps/web/app/assessment/AssessmentWorkspace.tsx'

      - name: Verify identifier compaction helper
        run: grep -Fq 'function compactIdentifier' apps/web/app/assessment/AssessmentWorkspace.tsx

      - name: Verify identifier component
        run: grep -Fq 'function IdentifierValue' apps/web/app/assessment/AssessmentWorkspace.tsx

      - name: Verify identifier copy label
        run: grep -Fq 'Copy full value' apps/web/app/assessment/AssessmentWorkspace.tsx

      - name: Verify clipboard copy implementation
        run: grep -Fq 'navigator.clipboard.writeText(fullValue)' apps/web/app/assessment/AssessmentWorkspace.tsx

      - name: Verify complete run ID remains accessible
        run: grep -Fq 'title={result?.run_id}' apps/web/app/assessment/AssessmentWorkspace.tsx

      - name: Verify immutable commit fallback handling
        run: grep -Fq 'immutableCommit === "—"' apps/web/app/assessment/AssessmentWorkspace.tsx

      - name: Verify report waits for scanner completion
        run: grep -Fq 'running ? copy.awaitingScanner : copy.awaitingStage' apps/web/app/assessment/AssessmentWorkspace.tsx

      - name: Verify human review waits for report
        run: grep -Fq 'running ? copy.reviewAfterReport : copy.awaitingStage' apps/web/app/assessment/AssessmentWorkspace.tsx

      - name: Verify maturity waits for scoring
        run: grep -Fq 'running ? copy.maturityAfterScoring : copy.awaitingStage' apps/web/app/assessment/AssessmentWorkspace.tsx

      - name: Verify technical score distinguishes active run
        run: grep -Fq 'running ? copy.notScoredYet : copy.notScored' apps/web/app/assessment/AssessmentWorkspace.tsx

      - name: Verify mobile identifier containment
        run: python -m pytest -q --tb=short tests/test_professional_assessment_ui.py::test_mobile_identifier_controls_stay_contained

      - name: Verify simplified primary navigation
        run: python -m pytest -q --tb=short tests/test_primary_navigation_ui.py

      - name: Validate frontend type safety
        working-directory: apps/web
        run: |
          npm install --legacy-peer-deps
          npm run lint

      - name: Remove one-time transformation tooling
        run: git rm scripts/apply_professional_workspace_patch.py .github/workflows/apply-professional-workspace-patch.yml

      - name: Commit transformed source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/app/assessment/AssessmentWorkspace.tsx tests/test_professional_assessment_ui.py
          git commit -m "Apply professional assessment UI semantics"
          git push origin HEAD:fix/professional-ui-polish
