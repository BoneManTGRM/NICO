name: Apply Professional Workspace Patch

on:
  push:
    branches:
      - fix/professional-ui-polish
    paths:
      - scripts/apply_professional_workspace_patch.py
  pull_request:
    branches:
      - main
    paths:
      - scripts/apply_professional_workspace_patch.py
      - .github/workflows/apply-professional-workspace-patch.yml

permissions:
  contents: write
  pull-requests: read

jobs:
  apply:
    if: github.event_name == 'pull_request' || github.event.head_commit.message != 'Apply professional assessment UI semantics'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: fix/professional-ui-polish
          fetch-depth: 1

      - name: Apply assertion-bound source transformation
        run: python scripts/apply_professional_workspace_patch.py

      - name: Run focused source contracts
        id: focused
        continue-on-error: true
        run: |
          python -m pytest -q --tb=short \
            --junitxml=professional-ui-test-results.xml \
            tests/test_professional_assessment_ui.py \
            tests/test_primary_navigation_ui.py

      - name: Upload focused test evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: professional-ui-focused-tests-${{ github.sha }}-${{ github.run_id }}
          path: professional-ui-test-results.xml
          if-no-files-found: error
          retention-days: 30

      - name: Stop on focused contract failure
        if: steps.focused.outcome != 'success'
        run: exit 1

      - name: Validate frontend type safety
        working-directory: apps/web
        run: |
          npm install --legacy-peer-deps
          npm run lint

      - name: Remove one-time transformation tooling
        run: git rm scripts/apply_professional_workspace_patch.py .github/workflows/apply-professional-workspace-patch.yml

      - name: Commit transformed source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/app/assessment/AssessmentWorkspace.tsx tests/test_professional_assessment_ui.py
          git commit -m "Apply professional assessment UI semantics"
          git push origin HEAD:fix/professional-ui-polish
