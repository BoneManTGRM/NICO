name: Apply Professional Workspace Patch

# One-time assertion-bound transformation. This workflow removes itself after success.
on:
  pull_request:
    branches:
      - main
    paths:
      - scripts/apply_professional_workspace_patch.py
      - .github/workflows/apply-professional-workspace-patch.yml

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: professional-workspace-patch-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: fix/professional-ui-polish
          fetch-depth: 1

      - name: Apply assertion-bound source transformation
        run: python scripts/apply_professional_workspace_patch.py

      - name: Verify complete status vocabulary
        run: |
          python - <<'PY'
          from pathlib import Path
          source = Path('apps/web/app/assessment/AssessmentWorkspace.tsx').read_text(encoding='utf-8')
          required = (
              'Awaiting stage',
              'Awaiting scanner completion',
              'Begins after automated report',
              'Calculated after scoring',
              'Not scored yet',
              'Review limited · Not scored',
              'Baseline not established',
              'Input not provided',
              'Not applicable',
              'Runtime acceptance not provided',
              'Awaiting commercial inputs',
          )
          missing = [item for item in required if item not in source]
          if missing:
              raise SystemExit('Missing status copy: ' + ', '.join(missing))
          PY

      - name: Verify centralized status rendering
        run: |
          grep -Fq 'function formatStatus' apps/web/app/assessment/AssessmentWorkspace.tsx
          ! grep -Fq '{item.status || copy.notVerified}' apps/web/app/assessment/AssessmentWorkspace.tsx
          ! grep -Fq '{state} · {label}' apps/web/app/assessment/AssessmentWorkspace.tsx
          ! grep -Fq 'REVIEW_LIMITED_NOT_SCORED' apps/web/app/assessment/AssessmentWorkspace.tsx

      - name: Verify compact copyable identifiers
        run: |
          grep -Fq 'function compactIdentifier' apps/web/app/assessment/AssessmentWorkspace.tsx
          grep -Fq 'function IdentifierValue' apps/web/app/assessment/AssessmentWorkspace.tsx
          grep -Fq 'Copy full value' apps/web/app/assessment/AssessmentWorkspace.tsx
          grep -Fq 'navigator.clipboard.writeText(fullValue)' apps/web/app/assessment/AssessmentWorkspace.tsx
          grep -Fq 'title={result?.run_id}' apps/web/app/assessment/AssessmentWorkspace.tsx
          grep -Fq 'immutableCommit === "—"' apps/web/app/assessment/AssessmentWorkspace.tsx

      - name: Verify dependency-aware pending stages
        run: |
          grep -Fq 'running ? copy.awaitingScanner : copy.awaitingStage' apps/web/app/assessment/AssessmentWorkspace.tsx
          grep -Fq 'running ? copy.reviewAfterReport : copy.awaitingStage' apps/web/app/assessment/AssessmentWorkspace.tsx
          grep -Fq 'running ? copy.maturityAfterScoring : copy.awaitingStage' apps/web/app/assessment/AssessmentWorkspace.tsx
          grep -Fq 'running ? copy.notScoredYet : copy.notScored' apps/web/app/assessment/AssessmentWorkspace.tsx

      - name: Verify mobile containment contracts
        run: |
          grep -Fq '.nico-identifier-value' apps/web/styles/professional-polish.css
          grep -Fq 'overflow-wrap: anywhere' apps/web/styles/professional-polish.css
          grep -Fq 'word-break: break-word' apps/web/styles/professional-polish.css
          grep -Fq '@media (max-width: 430px)' apps/web/styles/professional-polish.css

      - name: Validate frontend type safety
        working-directory: apps/web
        run: |
          npm install --legacy-peer-deps
          npm run lint

      - name: Remove temporary transformation files
        run: |
          rm -f tests/test_professional_assessment_ui.py
          git rm scripts/apply_professional_workspace_patch.py .github/workflows/apply-professional-workspace-patch.yml

      - name: Commit transformed source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/app/assessment/AssessmentWorkspace.tsx
          git commit -m "Apply professional assessment UI semantics"
          git push origin HEAD:fix/professional-ui-polish
