name: Resilience Proof

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: resilience-proof-${{ github.ref }}
  cancel-in-progress: true

jobs:
  resilience-proof:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nico
          POSTGRES_PASSWORD: nico
          POSTGRES_DB: nico
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U nico -d nico"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12
    env:
      NICO_TEST_DATABASE_URL: postgresql://nico:nico@127.0.0.1:5432/nico
      PYTHONPATH: .
    steps:
      - name: Check out exact commit
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Install NICO runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build restart recovery and degradation proof
        run: |
          python scripts/build_resilience_proof.py \
            --database-url "$NICO_TEST_DATABASE_URL" \
            --suffix "${{ github.run_id }}${{ github.run_attempt }}" \
            --output audit-results/resilience-proof.json

      - name: Verify bounded resilience evidence
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("audit-results/resilience-proof.json")
          payload = json.loads(path.read_text(encoding="utf-8"))
          assert payload["status"] == "passed"
          assert payload["synthetic"] is True
          assert payload["live_production_claim"] is False
          assert payload["proof"]
          assert all(payload["proof"].values())
          assert payload["resume"]["continuation_thread_starts"] == 1
          assert payload["resume"]["duplicate_idempotent_reuse"] is True
          assert payload["memory_fallback"]["reconciliation_status"] == "blocked"
          assert payload["event_pipeline_degradation"]["pipeline_status"] == "degraded"
          serialized = json.dumps(payload)
          assert "postgresql://" not in serialized
          assert "NICO_TEST_DATABASE_URL" not in serialized
          assert "must-not-appear" not in serialized
          PY

      - name: Upload resilience proof
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: resilience-proof-${{ github.run_id }}-${{ github.run_attempt }}
          path: audit-results/resilience-proof.json
          if-no-files-found: error
          retention-days: 90
