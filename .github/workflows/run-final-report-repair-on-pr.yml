name: Run final report repair on PR

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/final-report-approval-semantics-once.yml
      - .github/workflows/run-final-report-repair-on-pr.yml

permissions:
  contents: write

concurrency:
  group: run-final-report-repair-on-pr
  cancel-in-progress: false

jobs:
  repair:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out PR branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: '3.12'
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install application dependencies
        run: pip install -r requirements.txt

      - name: Execute the reviewed assertion-bound repair script
        id: transform
        run: |
          python - <<'PY'
          from pathlib import Path
          import traceback

          try:
              workflow = Path('.github/workflows/final-report-approval-semantics-once.yml').read_text(encoding='utf-8')
              marker = "          python - <<'PY'\n"
              start = workflow.index(marker) + len(marker)
              end = workflow.index("\n          PY", start)
              raw_script = workflow[start:end]
              script = "\n".join(
                  line[10:] if line.startswith("          ") else line
                  for line in raw_script.splitlines()
              )
              script = script.replace(
                  "    }', count=1)\n\nexpress_delivery =",
                  "    }', count=3)\n\nexpress_delivery =",
                  1,
              )
              namespace = {'__name__': '__main__'}
              exec(compile(script, 'final-report-approval-semantics-once.yml', 'exec'), namespace, namespace)

              test_path = Path('tests/test_full_assessment_pdf.py')
              test_text = test_path.read_text(encoding='utf-8')
              old_assertion = '    assert assessment["status"] == "draft"\n'
              new_assertions = (
                  '    assert assessment["status"] == "complete"\n'
                  '    assert assessment["report_finality"] == "final"\n'
                  '    assert assessment["review_status"] == "pending_human_approval"\n'
                  '    assert assessment["delivery_status"] == "blocked_pending_human_approval"\n'
                  '    assert assessment["draft_only"] is False\n'
              )
              observed = test_text.count(old_assertion)
              if observed != 1:
                  raise RuntimeError(f'Expected one obsolete Full draft assertion, found {observed}')
              test_path.write_text(test_text.replace(old_assertion, new_assertions, 1), encoding='utf-8')
          except BaseException:
              diagnostic = traceback.format_exc()
              Path('repair-error.txt').write_text(diagnostic, encoding='utf-8')
              print(diagnostic)
              raise
          PY

      - name: Upload repair diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: final-report-repair-diagnostics
          path: repair-error.txt
          if-no-files-found: ignore
          retention-days: 7

      - name: Verify focused report semantics
        run: |
          set +e
          pytest -q tests/test_final_report_approval_semantics.py tests/test_full_assessment_pdf.py tests/test_durable_storage_resolution_v2.py 2>&1 | tee report-semantics-test-output.txt
          status=${PIPESTATUS[0]}
          exit "$status"

      - name: Upload focused regression output
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: final-report-regression-output
          path: report-semantics-test-output.txt
          if-no-files-found: ignore
          retention-days: 7

      - name: Install exact frontend dependencies
        working-directory: apps/web
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Verify frontend typecheck and production build
        working-directory: apps/web
        run: |
          npm run lint
          npm run build

      - name: Remove temporary workflows and commit verified repair
        run: |
          rm .github/workflows/final-report-approval-semantics-once.yml
          rm .github/workflows/run-final-report-repair-on-pr.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Separate final report artifacts from approval status"
          git push origin HEAD:${{ github.head_ref }}
