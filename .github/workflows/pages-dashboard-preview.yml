name: Deploy NICO Dashboard Preview

# Manual-only safety valve.
# The public preview is already mirrored into root index.html, docs/dashboard-preview/index.html,
# and gh-pages/index.html. Do not auto-deploy from this workflow unless the repository
# Pages source is intentionally configured to GitHub Actions.

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload dashboard preview artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/dashboard-preview

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
