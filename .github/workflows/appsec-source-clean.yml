name: APPSEC Source Clean

on:
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/ci-final-pytest-failures

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Guarded tuple source patch
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("nico/cli.py")
          content = path.read_text(encoding="utf-8")

          old = '''(
                  "ai_agent_permission_drift",
                  "high",
                  "AI over-permission fixture",
                  "over_permissive_tools = True",
                  "Restrict AI-agent tools to least privilege.",
                  "OWASP-LLM-A06",
              ),'''

          new = '''(
                  "ai_agent_permission_drift",
                  "high",
                  "AI over-permission fixture",
                  "over_permissive_tools = True",
                  "Restrict AI-agent tools to least privilege.",
                  "Over-permissioned AI tools can exceed intended access boundaries.",
                  "OWASP-LLM-A06",
              ),'''

          if new in content:
              print("APPSEC tuple already source-cleaned")
              raise SystemExit(0)

          assert content.count(old) == 1, "Target APPSEC tuple not found exactly once"
          updated = content.replace(old, new, 1)

          assert len(updated.splitlines()) > 900, "Refusing write: cli.py would be truncated"
          forbidden = ["[targeted tuple edit]", "[full content", "...fixed tuple...", "placeholder"]
          lower = updated.lower()
          for marker in forbidden:
              assert marker.lower() not in lower, f"Refusing write: found marker {marker}"

          required = [
              "from __future__ import annotations",
              "class Store",
              "def run_scan",
              "def apply_rye",
              "def repairs_for",
              "def generate_reports",
              "def scan_test_lab",
              "def scan_drift_demo",
              "def verify_latest",
              "def rye_score",
              "def main",
              "APPSEC_PATTERNS",
              "REPAIR_LIBRARY",
          ]
          for item in required:
              assert item in updated, f"Refusing write: missing {item}"

          path.write_text(updated, encoding="utf-8")
          print("APPSEC tuple source-cleaned safely")
          print("cli.py lines:", len(updated.splitlines()))
          PY

      - name: Add tuple-shape guard if missing
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("tests/test_phase3_file_integrity.py")
          content = path.read_text(encoding="utf-8")
          marker = "def test_appsec_patterns_source_tuples_are_7_values():"
          if marker in content:
              print("Tuple-shape guard already present")
              raise SystemExit(0)

          addition = '''\n\ndef test_appsec_patterns_source_tuples_are_7_values():\n    import ast\n\n    tree = ast.parse(CLI.read_text(encoding="utf-8"))\n    appsec = None\n\n    for node in tree.body:\n        if isinstance(node, ast.Assign):\n            for target in node.targets:\n                if isinstance(target, ast.Name) and target.id == "APPSEC_PATTERNS":\n                    appsec = ast.literal_eval(node.value)\n\n    assert appsec is not None, "APPSEC_PATTERNS not found"\n    bad = [item for item in appsec if len(item) != 7]\n    assert not bad, f"APPSEC_PATTERNS contains non-7-value tuples: {bad}"\n'''
          path.write_text(content + addition, encoding="utf-8")
          print("Added APPSEC tuple-shape guard")
          PY

      - name: Verify patch
        run: |
          python -m py_compile nico/cli.py
          python -m pytest tests/test_phase3_file_integrity.py -v
          python -m pytest tests/ -v --tb=short
          git diff --stat
          git diff -- nico/cli.py tests/test_phase3_file_integrity.py

      - name: Commit guarded patch
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nico/cli.py tests/test_phase3_file_integrity.py
          git commit -m "Source-clean APPSEC tuple and guard tuple shape"
          git push origin HEAD:fix/ci-final-pytest-failures
