name: Authorized Production Assessment Smoke

on:
  workflow_dispatch:
    inputs:
      expected_commit_sha:
        description: Exact deployed main commit to verify and exercise
        required: true
        type: string
      authorization_reference:
        description: Internal reference proving authorization for the allowlisted demonstration repository
        required: true
        type: string
      confirmation:
        description: Explicit authorization confirmation
        required: true
        type: choice
        options:
          - NOT_AUTHORIZED
          - I_CONFIRM_AUTHORIZED_PRODUCTION_SMOKE
        default: NOT_AUTHORIZED

permissions:
  contents: read
  statuses: read

concurrency:
  group: authorized-production-assessment-smoke
  cancel-in-progress: false

jobs:
  production-assessment-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: production-smoke
    env:
      NICO_PRODUCTION_FRONTEND_URL: ${{ vars.NICO_PRODUCTION_FRONTEND_URL }}
      NICO_PRODUCTION_BACKEND_URL: ${{ vars.NICO_PRODUCTION_BACKEND_URL }}
      NICO_PRODUCTION_SMOKE_REPOSITORY: ${{ vars.NICO_PRODUCTION_SMOKE_REPOSITORY }}
      NICO_PRODUCTION_SMOKE_ALLOWED_HOSTS: ${{ vars.NICO_PRODUCTION_SMOKE_ALLOWED_HOSTS }}
      NICO_PRODUCTION_BACKEND_STATUS_CONTEXT: ${{ vars.NICO_PRODUCTION_BACKEND_STATUS_CONTEXT }}
      NICO_PRODUCTION_SMOKE_ADMIN_TOKEN: ${{ secrets.NICO_PRODUCTION_SMOKE_ADMIN_TOKEN }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Check out exact commit
        uses: actions/checkout@v7

      - name: Enforce exact main and explicit authorization
        env:
          EXPECTED_COMMIT_SHA: ${{ inputs.expected_commit_sha }}
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          set -euo pipefail
          test "${GITHUB_REF_NAME}" = "main"
          test "${EXPECTED_COMMIT_SHA}" = "${GITHUB_SHA}"
          test "${CONFIRMATION}" = "I_CONFIRM_AUTHORIZED_PRODUCTION_SMOKE"
          test -n "${NICO_PRODUCTION_FRONTEND_URL}"
          test -n "${NICO_PRODUCTION_BACKEND_URL}"
          test -n "${NICO_PRODUCTION_SMOKE_REPOSITORY}"
          test -n "${NICO_PRODUCTION_SMOKE_ALLOWED_HOSTS}"
          test -n "${NICO_PRODUCTION_BACKEND_STATUS_CONTEXT}"
          test -n "${NICO_PRODUCTION_SMOKE_ADMIN_TOKEN}"
          echo "::add-mask::${NICO_PRODUCTION_SMOKE_ADMIN_TOKEN}"

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Verify deployment and health before browser starts
        env:
          EXPECTED_COMMIT_SHA: ${{ inputs.expected_commit_sha }}
          AUTHORIZATION_REFERENCE: ${{ inputs.authorization_reference }}
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          set -euo pipefail
          python scripts/production_assessment_browser_smoke_v2.py \
            --preflight-only \
            --frontend-url "${NICO_PRODUCTION_FRONTEND_URL}" \
            --backend-url "${NICO_PRODUCTION_BACKEND_URL}" \
            --repository "${NICO_PRODUCTION_SMOKE_REPOSITORY}" \
            --allowlisted-repository "${NICO_PRODUCTION_SMOKE_REPOSITORY}" \
            --allowed-hosts "${NICO_PRODUCTION_SMOKE_ALLOWED_HOSTS}" \
            --authorization-reference "${AUTHORIZATION_REFERENCE}" \
            --confirmation "${CONFIRMATION}" \
            --commit-sha "${EXPECTED_COMMIT_SHA}" \
            --github-repository "${GITHUB_REPOSITORY}" \
            --customer-id "production_smoke_${GITHUB_RUN_ID}" \
            --project-id "production_smoke_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}" \
            --frontend-status-context "Vercel" \
            --backend-status-context "${NICO_PRODUCTION_BACKEND_STATUS_CONTEXT}" \
            --request-timeout-seconds "60" \
            --express-timeout-seconds "900"

      - name: Install pinned Playwright Chromium
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check --no-cache-dir "playwright==1.61.0"
          python -m playwright install --with-deps chromium

      - name: Run exactly one deployed browser start per tier
        id: smoke
        continue-on-error: true
        env:
          EXPECTED_COMMIT_SHA: ${{ inputs.expected_commit_sha }}
          AUTHORIZATION_REFERENCE: ${{ inputs.authorization_reference }}
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          set -euo pipefail
          python scripts/production_assessment_browser_smoke_v2.py \
            --frontend-url "${NICO_PRODUCTION_FRONTEND_URL}" \
            --backend-url "${NICO_PRODUCTION_BACKEND_URL}" \
            --repository "${NICO_PRODUCTION_SMOKE_REPOSITORY}" \
            --allowlisted-repository "${NICO_PRODUCTION_SMOKE_REPOSITORY}" \
            --allowed-hosts "${NICO_PRODUCTION_SMOKE_ALLOWED_HOSTS}" \
            --authorization-reference "${AUTHORIZATION_REFERENCE}" \
            --confirmation "${CONFIRMATION}" \
            --commit-sha "${EXPECTED_COMMIT_SHA}" \
            --github-repository "${GITHUB_REPOSITORY}" \
            --customer-id "production_smoke_${GITHUB_RUN_ID}" \
            --project-id "production_smoke_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}" \
            --frontend-status-context "Vercel" \
            --backend-status-context "${NICO_PRODUCTION_BACKEND_STATUS_CONTEXT}" \
            --request-timeout-seconds "60" \
            --express-timeout-seconds "900" \
            --output-json audit-results/production-assessment-smoke.json \
            --output-markdown audit-results/production-assessment-smoke.md \
            --browser-evidence-json audit-results/production-assessment-browser-evidence.json \
            --preflight-output audit-results/production-assessment-preflight.json \
            --screenshot-dir audit-results/production-assessment-browser

      - name: Upload bounded production proof
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: authorized-production-assessment-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            audit-results/production-assessment-preflight.json
            audit-results/production-assessment-browser-evidence.json
            audit-results/production-assessment-smoke.json
            audit-results/production-assessment-smoke.md
            audit-results/production-assessment-browser/
          if-no-files-found: error
          retention-days: 90

      - name: Require passing combined browser and API proof
        if: always()
        run: |
          set -euo pipefail
          test "${{ steps.smoke.outcome }}" = "success"
          python - <<'PY'
          import json
          from pathlib import Path

          artifact = json.loads(Path("audit-results/production-assessment-smoke.json").read_text(encoding="utf-8"))
          browser = json.loads(Path("audit-results/production-assessment-browser-evidence.json").read_text(encoding="utf-8"))
          assert artifact["status"] == "passed"
          assert artifact["evidence_kind"] == "authorized_live_production_browser_api_smoke"
          assert artifact["live_claim"] is True
          assert artifact["authorization_confirmed"] is True
          assert artifact["proof"]["one_start_per_tier"] is True
          assert artifact["proof"]["exact_run_continuation"] is True
          assert artifact["proof"]["human_review_boundary_preserved"] is True
          assert artifact["proof"]["no_client_ready_claim"] is True
          assert artifact["proof"]["matching_browser_evidence"] is True
          assert artifact["proof"]["screenshots_retained"] is True
          assert artifact["proof"]["same_isolated_browser_tenant"] is True
          assert artifact["proof"]["no_unexpected_assessment_origins"] is True
          assert artifact["proof"]["browser_generated_the_only_api_starts"] is True
          assert browser["status"] == "passed"
          assert browser["playwright_version"] == "1.61.0"
          assert browser["lifecycle_version"] == "express_async_v1"
          assert browser["proof"]["exact_run_continuation"] is True
          assert browser["proof"]["same_origin_lifecycle_transport"] is True
          assert browser["proof"]["no_long_express_browser_connection"] is True
          assert len(browser["tiers"]) == 3
          assert all(item["start_count"] == 1 for item in browser["tiers"])
          assert all(item["polled_single_exact_status_url"] is True for item in browser["tiers"])
          assert all(Path(item["screenshot_path"]).is_file() for item in browser["tiers"])
          PY
