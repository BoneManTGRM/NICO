name: Improvement proposal
description: Propose a defensive, evidence-bound product or engineering improvement.
title: "[Improvement]: "
labels: []
body:
  - type: checkboxes
    id: boundary
    attributes:
      label: Boundary confirmation
      options:
        - label: This proposal is defensive and does not require unauthorized access, exploitation, evasion, persistence, or destructive behavior.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the current limitation with evidence.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Define observable acceptance criteria rather than cosmetic score or status changes.
    validations:
      required: true
  - type: dropdown
    id: maturity
    attributes:
      label: Intended maturity
      options:
        - Stable
        - Operational
        - Experimental
        - Legacy removal
        - Documentation only
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence and affected workflow
      description: Identify routes, modules, states, run identities, fixtures, or deployment checks.
  - type: textarea
    id: safety
    attributes:
      label: Safety, truth, and rollback considerations
      description: Explain authorization, unavailable evidence, human review, persistence, and rollback effects.
  - type: textarea
    id: tests
    attributes:
      label: Required verification
      description: List unit, integration, E2E, deployment, or readiness evidence needed before merge.
