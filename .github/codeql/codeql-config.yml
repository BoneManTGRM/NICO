name: NICO CodeQL precision config

queries:
  - uses: security-extended
  - uses: security-and-quality

query-filters:
  - exclude:
      id: py/stack-trace-exposure

paths-ignore:
  - "**/.nico/**"
  - "**/node_modules/**"
  - "**/.venv/**"
  - "**/venv/**"
  - "**/__pycache__/**"
  - "**/dist/**"
  - "**/build/**"
