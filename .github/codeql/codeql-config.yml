name: NICO CodeQL precision config

# Keep the advanced workflow focused on actionable security signals.
# Do not enable security-and-quality here: it produces broad maintainability/test
# notes that swamp the security dashboard and are tracked separately by NICO CI.
query-filters:
  - exclude:
      id: py/stack-trace-exposure

paths-ignore:
  - "**/.nico/**"
  - "**/node_modules/**"
  - "**/.venv/**"
  - "**/venv/**"
  - "**/__pycache__/**"
  - "**/dist/**"
  - "**/build/**"
